<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="/static/reportly_icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportly</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Reportly</h1>
        <p class="subtitle">Turn your raw social media data into client-ready reports in seconds.</p>

        <div class="input-section">
            <label>Paste your social media data below:</label>
            <textarea id="dataInput" placeholder="Paste your data here — CSV, numbers, platform exports, anything..."></textarea>
            <button id="generateBtn" onclick="generateReport()">Generate Report</button>
        </div>

        <div class="output-section" id="outputSection" style="display:none">
            <h2>Your Report</h2>
            <div id="reportOutput"></div>
            <button onclick="copyReport()">Copy Report</button>
        </div>

        <div id="loading" style="display:none">
            <p>Analyzing your data...</p>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
