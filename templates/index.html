<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportly</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/x-icon" href="/static/reportly_icon.png">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Reportly</h1>
            <p class="subtitle">Turn raw social media data into strategic client reports — instantly.</p>
        </div>

        <div class="instagram-section">
            <label>Fetch directly from Instagram:</label>
            <div class="instagram-input">
                <input type="text" id="instagramUsername"
                       placeholder="@username or profile URL" />
                <button onclick="fetchInstagram()"
                        id="fetchBtn">Fetch Data</button>
            </div>
            <p class="instagram-note">Or paste data manually below</p>
        </div>

        <div class="input-section">
            <label>Paste your social media data:</label>
            <textarea id="dataInput" placeholder="Paste anything — CSV exports, numbers, platform data, messy notes..."></textarea>
            <button id="generateBtn" onclick="generateReport()">Generate Report</button>
        </div>

        <div id="loading" style="display:none">
            <div class="loader"></div>
            <p>Analyzing your data...</p>
        </div>

        <div id="outputSection" style="display:none">

            <div class="summary-card">
                <div class="health-badge" id="healthBadge"></div>
                <p id="overallSummary"></p>
            </div>

            <div class="insights-section">
                <h2>Key Insights</h2>
                <ul id="keyInsights"></ul>
            </div>

            <div class="posts-section">
                <h2>Post Analysis</h2>
                <div id="postsGrid"></div>
            </div>

            <div class="recommendations-section">
                <h2>Strategic Recommendations</h2>
                <ul id="recommendations"></ul>
            </div>

            <div class="button-group">
                <button onclick="copyReport()" class="copy-btn">Copy Report</button>
                <button onclick="downloadPDF('client')" class="client-btn">Download Client Report PDF</button>
                <button onclick="downloadPDF('smm')" class="smm-btn">Download SMM Report PDF</button>
            </div>

        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
